services:
  - type: web
    name: portfolio-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python backend/ingest.py
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_CHAT_MODEL
        value: openai/gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CHROMA_PATH
        value: /var/data/chroma
      - key: RAG_TOP_K
        value: "4"
      - key: OPENAI_HTTP_REFERER
        sync: false
      - key: OPENAI_APP_TITLE
        value: Resume Chatbot
    disk:
      name: chroma-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: portfolio-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
